name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-15]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install cibuildwheel
      - run: cibuildwheel
        env:
          CIBW_BUILD: "cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_BEFORE_BUILD_LINUX: >
            curl -L https://ziglang.org/download/0.14.0/zig-linux-$(uname -m)-0.14.0.tar.xz
            | tar -xJ -C /tmp
            && export PATH="/tmp/zig-linux-$(uname -m)-0.14.0:$PATH"
            && zig build
          CIBW_BEFORE_BUILD_MACOS: zig build
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish:
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "{sdist,wheels-*}"
          merge-multiple: true
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
